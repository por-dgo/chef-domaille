<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <title>Chef Domaille</title>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="page-bg">
    <header class="topbar card">
      <div class="topbar-row">
        <img class="topbar-icon" src="/static/chef_domaille.png" alt="" aria-hidden="true">
        <div>
          <h1>Chef Domaille</h1>
          <p>Polisher recipe manager for the APM-HDC-5320</p>
        </div>
      </div>
    </header>

    <main class="layout">
      <div class="side-stack side-left">
        <section class="panel card side-card collapsible-panel collapsed">
          <div class="panel-head" id="settingsHead" style="cursor:pointer">
            <h2>Machine Settings</h2>
            <span id="settingsSubtitle" class="panel-sub"></span>
            <button type="button" id="settingsToggleBtn" class="panel-toggle" aria-expanded="false" aria-controls="settingsBody" title="Expand settings">&#9654;</button>
          </div>
          <div id="settingsBody" class="collapsible-body" hidden>
            <div class="settings-group">
              <label class="settings-label" for="filmOptionInput">Film Options</label>
              <div class="chip-input-row">
                <input id="filmOptionInput" placeholder="Add film option" />
                <button type="button" id="addFilmOptionBtn" class="secondary-btn">Add</button>
              </div>
              <div id="filmOptionList" class="chip-list" aria-live="polite"></div>
            </div>
            <div class="settings-group">
              <label class="settings-label" for="padOptionInput">Pad Options</label>
              <div class="chip-input-row">
                <input id="padOptionInput" placeholder="Add pad option" />
                <button type="button" id="addPadOptionBtn" class="secondary-btn">Add</button>
              </div>
              <div id="padOptionList" class="chip-list" aria-live="polite"></div>
            </div>
            <div class="settings-group">
              <label class="settings-label" for="lubricantOptionInput">Lubricant Options</label>
              <div class="chip-input-row">
                <input id="lubricantOptionInput" placeholder="Add lubricant option" />
                <button type="button" id="addLubricantOptionBtn" class="secondary-btn">Add</button>
              </div>
              <div id="lubricantOptionList" class="chip-list" aria-live="polite"></div>
            </div>
            <div class="row">
              <button id="saveSettingsBtn">Save Settings</button>
            </div>
          </div>
        </section>

        <section class="panel card side-card">
          <div class="panel-head">
            <h2>Recipes</h2>
          </div>
          <div class="row">
            <button id="importBtn" class="secondary-btn">Import</button>
            <button id="exportBtn" class="secondary-btn">Export</button>
          </div>

          <div id="exportAccordion" hidden>
            <div class="accordion-body">
              <h4>Export Recipes</h4>
              <p class="accordion-hint">Click recipes below to select/deselect.</p>
              <label>Type
                <select id="exportTypeSelect">
                  <option value="book">Recipe Book (.chef)</option>
                  <option value="thumb">Thumb Drive Folder</option>
                </select>
              </label>
              <div id="exportThumbRow" hidden>
                <label>Folder Path<input id="exportThumbPath" placeholder="F:\Domaille"></label>
              </div>
              <div id="exportBookRow">
                <label>File Name<input id="exportBookName" value="recipe-book.chef"></label>
              </div>
              <div class="row">
                <button id="exportRunBtn">Export</button>
                <button id="exportCancelBtn" class="secondary-btn">Cancel</button>
              </div>
            </div>
          </div>

          <div id="importAccordion" hidden>
            <div class="accordion-body">
              <h4>Import Recipes</h4>
              <label>Type
                <select id="importTypeSelect">
                  <option value="book">Recipe Book (.chef)</option>
                  <option value="thumb">Thumb Drive Folder</option>
                </select>
              </label>
              <div id="importThumbRow" hidden>
                <label>Folder Path<input id="importThumbPath" placeholder="F:\Domaille"></label>
              </div>
              <div id="importBookRow">
                <label>Recipe Book File<input id="importBookFile" type="file" accept=".chef"></label>
              </div>
              <div class="row">
                <button id="importRunBtn">Import</button>
                <button id="importCancelBtn" class="secondary-btn">Cancel</button>
              </div>
            </div>
          </div>

          <ul id="recipeList" class="recipe-list"></ul>
        </section>
      </div>

      <section class="panel card editor-card">
        <div class="panel-head">
          <h2>Recipe Editor</h2>
          <span id="editorSubtitle" class="panel-sub"></span>
        </div>
        <div id="editorPlaceholder" class="editor-placeholder">
          <img class="placeholder-icon" src="/static/chef_domaille.png" alt="" aria-hidden="true">
          <p>Select a recipe from the list, or create a new one.</p>
          <button id="placeholderNewBtn" type="button">New Recipe</button>
        </div>
        <div id="editorBody" hidden>

      <!-- Recipe metadata -->
      <div class="recipe-meta">
        <div class="row grid2">
          <label>Recipe Name<span class="field-help" tabindex="0" role="button" aria-label="Help: Recipe Name">i<span class="field-help-tip">Unique name for this recipe. Must match the folder name on the machine's thumb drive.</span></span><input id="recipeName" /></label>
          <label>Description<span class="field-help" tabindex="0" role="button" aria-label="Help: Description">i<span class="field-help-tip">Optional description shown on the machine display during operation.</span></span><input id="recipeDescription" /></label>
        </div>
        <div class="row grid1">
          <label>Qty<span class="field-help" tabindex="0" role="button" aria-label="Help: Qty">i<span class="field-help-tip">Maximum contacts loaded in the fixture for this recipe (2–32). Combined with Pressure, determines force per contact.<span class="ppc-line" id="qtyPpcLine"></span></span></span><input id="recipeQty" type="number" min="2" max="32" /></label>
        </div>
      </div>

      <!-- Step tabs (browser-tab style) -->
      <div class="step-tab-bar">
        <div id="stepTabs" class="step-tabs" role="tablist" aria-label="Recipe Steps"></div>
        <button type="button" id="addStepBtn" class="step-tab-add" title="Add step" aria-label="Add step">+</button>
      </div>

      <!-- Category tabs within current step -->
      <div class="tab-strip" role="tablist" aria-label="Step Categories">
        <button class="tab-btn active" id="tabMotionBtn" data-tab="motion" role="tab" aria-selected="true">Motion &amp; Pressure</button>
        <button class="tab-btn" id="tabConsumablesBtn" data-tab="consumables" role="tab" aria-selected="false">Consumables &amp; Notes</button>
      </div>

      <div class="step-zone">
      <section class="tab-panel active" data-tab-panel="motion" role="tabpanel">
        <div class="row grid3">
          <label>Time (s)<span class="field-help" tabindex="0" role="button" aria-label="Help: Time">i<span class="field-help-tip">Duration this step runs, in seconds (10–300).</span></span><input id="stepTime" type="number" min="10" max="300"></label>
          <label>Pressure (lbs)<span class="field-help" tabindex="0" role="button" aria-label="Help: Pressure">i<span class="field-help-tip">Total downward force on the fixture (0–16 lbs for the 5320/5316). Divided across all contacts.<span class="ppc-line" id="pressurePpcLine"></span></span></span><input id="stepPressure" type="number" min="0" max="16" step="0.1"></label>
          <label>Speed (RPM)<span class="field-help" tabindex="0" role="button" aria-label="Help: Speed">i<span class="field-help-tip">Platen/head rotation speed in RPM. Zero is valid if the machine’s “Zero Speed” option is enabled.</span></span><input id="stepSpeed" type="number" min="0"></label>
        </div>
        <div class="row grid2">
          <label>Speed Ramp Up (s)<span class="field-help" tabindex="0" role="button" aria-label="Help: Speed Ramp Up">i<span class="field-help-tip">Seconds to ramp from 0 RPM to programmed speed at step start (0–60).</span></span><input id="stepSpeedRamp" type="number" min="0" max="60"></label>
          <label>Speed Ramp Down (s)<span class="field-help" tabindex="0" role="button" aria-label="Help: Speed Ramp Down">i<span class="field-help-tip">Seconds to decelerate from programmed speed to stopped at step end (0–60).</span></span><input id="stepSpeedRampDn" type="number" min="0" max="60"></label>
        </div>
        <div class="row grid2">
          <label>Pressure Ramp Up (s)<span class="field-help" tabindex="0" role="button" aria-label="Help: Pressure Ramp Up">i<span class="field-help-tip">Seconds to ramp from 0 to programmed pressure at step start (0–60).</span></span><input id="stepPressureRamp" type="number" min="0" max="60"></label>
          <label>Pressure Ramp Down (s)<span class="field-help" tabindex="0" role="button" aria-label="Help: Pressure Ramp Down">i<span class="field-help-tip">Seconds to release from programmed pressure to zero at step end (0–60).</span></span><input id="stepPressureRampDn" type="number" min="0" max="60"></label>
        </div>
      </section>

      <section class="tab-panel" data-tab-panel="consumables" role="tabpanel" hidden>
        <div class="row grid3">
          <label>Film<span class="field-help" tabindex="0" role="button" aria-label="Help: Film">i<span class="field-help-tip">Abrasive film used for this step. Select from configured options or type a custom value.</span></span>
            <div class="combo" id="comboFilm">
              <input id="stepFilm" autocomplete="off">
              <button type="button" class="combo-toggle" tabindex="-1" aria-label="Show options">&#9662;</button>
              <ul class="combo-list" hidden></ul>
            </div>
          </label>
          <label>Pad<span class="field-help" tabindex="0" role="button" aria-label="Help: Pad">i<span class="field-help-tip">Polishing pad placed under the film. Select from configured options or type a custom value.</span></span>
            <div class="combo" id="comboPad">
              <input id="stepPad" autocomplete="off">
              <button type="button" class="combo-toggle" tabindex="-1" aria-label="Show options">&#9662;</button>
              <ul class="combo-list" hidden></ul>
            </div>
          </label>
          <label>Lubricant<span class="field-help" tabindex="0" role="button" aria-label="Help: Lubricant">i<span class="field-help-tip">Lubricant applied during polishing (e.g. DI Water). Select from configured options or type a custom value.</span></span>
            <div class="combo" id="comboLubricant">
              <input id="stepLubricant" autocomplete="off">
              <button type="button" class="combo-toggle" tabindex="-1" aria-label="Show options">&#9662;</button>
              <ul class="combo-list" hidden></ul>
            </div>
          </label>
        </div>
        <div class="row grid2">
          <label>Step Note 1<span class="field-help" tabindex="0" role="button" aria-label="Help: Step Note 1">i<span class="field-help-tip">Optional note displayed to the operator on the machine during this step.</span></span><input id="stepNote1"></label>
          <label>Step Note 2<span class="field-help" tabindex="0" role="button" aria-label="Help: Step Note 2">i<span class="field-help-tip">Optional second note displayed to the operator on the machine during this step.</span></span><input id="stepNote2"></label>
        </div>
      </section>
      </div>

      <!-- Sticky action bar -->
      <div class="editor-actions">
        <div class="editor-actions-left">
          <button id="saveBtn" disabled>Save</button>
          <button id="resetBtn" class="secondary-btn" disabled>Reset</button>
          <button id="cancelBtn" class="secondary-btn">Cancel</button>
        </div>
        <button id="deleteBtn" class="danger-btn">Delete</button>
      </div>

      </div>
      </section>
    </main>

    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <div id="confirmModal" class="modal-overlay" hidden>
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="confirmTitle" aria-describedby="confirmMessage">
        <h3 id="confirmTitle">Please Confirm</h3>
        <p id="confirmMessage">Are you sure?</p>
        <div class="modal-actions">
          <button type="button" id="confirmCancelBtn" class="secondary-btn">Cancel</button>
          <button type="button" id="confirmOkBtn">Confirm</button>
        </div>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
